<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #f4f7fb;
      color: #111;
    }

    .wrapper {
      width: 100%;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .banner {
      min-height: 100vh;
      display: flex;
      align-items: center;
      background: linear-gradient(135deg, #f8fbff, #eaf2ff);
    }

    .banner__left {
      max-width: 650px;
      background: #fff;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .banner__heading {
      font-size: 34px;
      font-weight: 700;
      margin-bottom: 15px;
      color: #000;
    }

    .banner__text1 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #000;
    }

    .banner__box_bottom {
      background: #f8fafc;
      border: 1px solid #ddd;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .banner__box_bottom h1 {
      font-size: 26px;
      margin-bottom: 15px;
    }

    .banner__button_box {
      display: flex;
      gap: 12px;
    }

    .banner__button {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      color: #fff;
      background: #0d6efd;
      transition: 0.2s;
    }

    .banner__button:hover {
      background: #0b5ed7;
    }

    .banner__button:last-child {
      background: #198754;
    }

    .banner__button:last-child:hover {
      background: #157347;
    }

    .banner__secure {
      font-size: 14px;
      color: #444;
      margin-top: 10px;
    }

    @media (max-width: 768px) {
      .banner__heading {
        font-size: 26px;
      }

      .banner__box_bottom h1 {
        font-size: 22px;
      }

      .banner__button_box {
        flex-direction: column;
      }
    }
